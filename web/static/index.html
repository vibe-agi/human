<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Human Worker</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --line: #e2e5ea; --text: #1c2430;
    --muted: #6b7686; --accent: #2456d6; --danger: #c0392b; --ok: #1e8e4e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181f; --panel: #1d232d; --line: #2c3442; --text: #e6eaf1;
      --muted: #93a0b4; --accent: #6c96ff; --danger: #ff7b6b; --ok: #57c98a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.6 -apple-system, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    display: grid; grid-template-columns: 320px 1fr; height: 100vh;
  }
  aside { border-right: 1px solid var(--line); overflow-y: auto; padding: 12px; }
  main { display: flex; flex-direction: column; overflow: hidden; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 14px 4px 6px; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
  }
  .card.selected { border-color: var(--accent); }
  .card .meta { color: var(--muted); font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .card .preview { margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
  .card .actions { margin-top: 8px; display: flex; gap: 8px; }
  button {
    border: 1px solid var(--line); background: var(--panel); color: var(--text);
    border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger { color: var(--danger); border-color: var(--danger); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  #transcript { flex: 1; overflow-y: auto; padding: 18px 22px; }
  .entry { max-width: 760px; margin: 0 auto 12px; }
  .entry .who { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .entry .bubble {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; white-space: pre-wrap; word-break: break-word;
  }
  .entry.human .bubble { border-color: var(--accent); }
  .entry.rejected .bubble { border-color: var(--danger); }
  #composer { border-top: 1px solid var(--line); padding: 12px 22px 16px; background: var(--panel); }
  #composer .inner { max-width: 760px; margin: 0 auto; }
  textarea {
    width: 100%; min-height: 72px; resize: vertical; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 12px; background: var(--bg); color: var(--text);
    font: inherit;
  }
  #composer .row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #phase { color: var(--muted); font-size: 12px; margin-left: auto; }
  #topbar { position: fixed; right: 14px; top: 10px; display: flex; gap: 10px; align-items: center; font-size: 12px; }
  #status { color: var(--muted); }
  #status.offline { color: var(--danger); }
  #lang { padding: 2px 8px; font-size: 12px; }
  #empty { flex: 1; display: grid; place-items: center; color: var(--muted); }
  details { margin-top: 8px; }
  details textarea { min-height: 56px; font-family: ui-monospace, monospace; font-size: 12px; }
</style>
</head>
<body>
<aside>
  <div id="topbar"><span id="status"></span><button id="lang"></button></div>
  <h2 data-i18n="inbox"></h2>
  <div id="inbox"></div>
  <h2 data-i18n="conversations"></h2>
  <div id="conversations"></div>
  <div id="review-panel" hidden>
    <h2 data-i18n="workspaceChanges"></h2>
    <div id="review"></div>
    <div class="actions" style="margin:4px">
      <button id="deliver-changes" class="primary"></button>
      <button id="discard-changes" class="danger"></button>
    </div>
  </div>
</aside>
<main>
  <div id="empty"></div>
  <div id="transcript" hidden></div>
  <div id="composer" hidden>
    <div class="inner">
      <textarea id="draft"></textarea>
      <div class="row">
        <button id="send-progress" class="primary"></button>
        <button id="send-clarify"></button>
        <button id="send-final" class="ok"></button>
        <span id="phase"></span>
      </div>
      <details>
        <summary id="tools-summary"></summary>
        <textarea id="tool-calls" placeholder='[{"id":"call-1","name":"bash","input":{"command":"ls"}}]'></textarea>
        <div class="row"><button id="send-tools"></button></div>
      </details>
    </div>
  </div>
</main>
<script>
"use strict";

// --- i18n: English default, Simplified Chinese available. ---
const MESSAGES = {
  en: {
    inbox: "Inbox", conversations: "Conversations", workspaceChanges: "Workspace changes",
    auxiliary: "auxiliary (likely title generation)",
    accept: "Accept", reject: "Reject", rejectPrompt: "Reason for rejecting",
    rejectDefault: "Unable to take this request", noText: "(no text)",
    deliverSelected: "Deliver selected", discardSelected: "Discard selected",
    sendProgress: "Send progress", clarify: "Ask back", final: "Deliver final",
    toolsSummary: "Advanced: tool calls (JSON)", sendTools: "Send tool calls",
    draftPlaceholder: "Write a reply… (Ctrl+Enter sends progress)",
    emptyHint: "Accept a request or pick a conversation on the left",
    connecting: "connecting…", connected: "connected", offline: "disconnected, retrying…",
    notifyNew: "Human: a new request is waiting",
    confirmFinal: "Send the final delivery and end this conversation?",
    confirmDiscard: "Discard the selected changes? They will not be delivered.",
    needConversation: "Select a conversation to deliver into first",
    needChanges: "Select changes first", parseError: "Tool-call JSON cannot be parsed",
    acceptFailed: "Accept failed: ", rejectFailed: "Reject failed: ",
    sendFailed: "Send failed: ", deliverFailed: "Deliver failed: ", discardFailed: "Discard failed: ",
    who: { caller: "Caller agent", human: "Me", system: "System" },
    kind: { progress: "progress", clarification: "question", final: "final",
      tool_calls: "tool calls", tool_result: "tool result", rejected: "rejected" },
    change: { create: "create", modify: "modify", delete: "delete" },
    phase: { active: "Your turn", awaiting_results: "Waiting for tool results…",
      awaiting_caller: "Asked back, waiting for the caller…", terminal: "Conversation ended" },
    phaseShort: { active: "active", awaiting_results: "awaiting results",
      awaiting_caller: "awaiting caller", terminal: "done" },
  },
  zh: {
    inbox: "收件箱", conversations: "会话", workspaceChanges: "工作区改动",
    auxiliary: "辅助请求(多为标题生成)",
    accept: "接单", reject: "拒单", rejectPrompt: "拒单原因",
    rejectDefault: "暂时无法处理", noText: "(无文本)",
    deliverSelected: "交付所选", discardSelected: "丢弃所选",
    sendProgress: "发送进度", clarify: "追问", final: "完成交付",
    toolsSummary: "高级:工具调用 (JSON)", sendTools: "发送工具调用",
    draftPlaceholder: "输入回复… (Ctrl+Enter 发送进度)",
    emptyHint: "从左侧接单或选择会话",
    connecting: "连接中…", connected: "已连接", offline: "连接断开,重连中…",
    notifyNew: "Human:有新的请求等待接单",
    confirmFinal: "确认发送最终交付并结束会话?",
    confirmDiscard: "丢弃所选改动?它们不会被交付。",
    needConversation: "请先选择要交付到的会话",
    needChanges: "请先勾选改动", parseError: "工具调用 JSON 无法解析",
    acceptFailed: "接单失败: ", rejectFailed: "拒单失败: ",
    sendFailed: "发送失败: ", deliverFailed: "交付失败: ", discardFailed: "丢弃失败: ",
    who: { caller: "对方 Agent", human: "我", system: "系统" },
    kind: { progress: "进度", clarification: "追问", final: "交付",
      tool_calls: "工具调用", tool_result: "工具结果", rejected: "被拒绝" },
    change: { create: "新增", modify: "修改", delete: "删除" },
    phase: { active: "轮到你回复", awaiting_results: "等待对方执行工具…",
      awaiting_caller: "已追问,等待对方…", terminal: "会话已结束" },
    phaseShort: { active: "进行中", awaiting_results: "等待工具结果",
      awaiting_caller: "等待对方回复", terminal: "已完成" },
  },
};
let locale = localStorage.getItem("human-web-locale")
  || ((navigator.language || "").toLowerCase().startsWith("zh") ? "zh" : "en");
if (!MESSAGES[locale]) locale = "en";
const t = (key) => MESSAGES[locale][key] ?? MESSAGES.en[key] ?? key;
const tt = (table, key) => (MESSAGES[locale][table] || {})[key]
  ?? (MESSAGES.en[table] || {})[key] ?? key;

function applyStaticText() {
  document.documentElement.lang = locale === "zh" ? "zh-CN" : "en";
  for (const node of document.querySelectorAll("[data-i18n]")) {
    node.textContent = t(node.dataset.i18n);
  }
  $("lang").textContent = locale === "zh" ? "EN" : "中文";
  $("deliver-changes").textContent = t("deliverSelected");
  $("discard-changes").textContent = t("discardSelected");
  $("send-progress").textContent = t("sendProgress");
  $("send-clarify").textContent = t("clarify");
  $("send-final").textContent = t("final");
  $("tools-summary").textContent = t("toolsSummary");
  $("send-tools").textContent = t("sendTools");
  $("draft").placeholder = t("draftPlaceholder");
  $("empty").textContent = t("emptyHint");
}

let state = { inbox: [], conversations: [] };
let selected = null; // {caller, task_id}
let draftTimer = null;

const $ = (id) => document.getElementById(id);

async function api(path, body) {
  const response = await fetch(path, {
    method: body ? "POST" : "GET",
    headers: body ? { "Content-Type": "application/json" } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.message || response.statusText);
  return data;
}

function keyOf(conversation) {
  return { caller: conversation.key.caller, task_id: conversation.key.task_id };
}
function sameKey(a, b) { return a && b && a.caller === b.caller && a.task_id === b.task_id; }

function selectedConversation() {
  return state.conversations.find((c) => sameKey(keyOf(c), selected)) || null;
}

function render() {
  const inbox = $("inbox");
  inbox.replaceChildren(...state.inbox.map((item) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="meta"><span>${item.tier || "chat"}</span><span>${item.task_id}</span></div>
      <div class="preview"></div>
      <div class="actions"></div>`;
    card.querySelector(".preview").textContent = item.preview || t("noText");
    card.dataset.testid = "inbox-item";
    if (!item.tool_count) {
      const badge = document.createElement("span");
      badge.textContent = t("auxiliary");
      badge.style.color = "var(--muted)";
      card.querySelector(".meta").append(badge);
    }
    const accept = document.createElement("button");
    accept.className = "primary"; accept.textContent = t("accept");
    accept.dataset.action = "accept";
    accept.onclick = async () => {
      try {
        const result = await api("/api/accept", { delivery: item.delivery });
        selected = { caller: result.key.Caller || result.key.caller, task_id: result.key.TaskID || result.key.task_id };
      } catch (error) { alert(t("acceptFailed") + error.message); }
    };
    const reject = document.createElement("button");
    reject.className = "danger"; reject.textContent = t("reject");
    reject.dataset.action = "reject";
    reject.onclick = async () => {
      const reason = prompt(t("rejectPrompt"), t("rejectDefault"));
      if (reason === null) return;
      try { await api("/api/reject", { delivery: item.delivery, reason }); }
      catch (error) { alert(t("rejectFailed") + error.message); }
    };
    card.querySelector(".actions").append(accept, reject);
    return card;
  }));

  const list = $("conversations");
  list.replaceChildren(...state.conversations.map((conversation) => {
    const card = document.createElement("div");
    const key = keyOf(conversation);
    card.className = "card" + (sameKey(key, selected) ? " selected" : "");
    card.innerHTML = `<div class="meta"><span></span><span>${tt("phaseShort", conversation.phase)}</span></div><div class="preview"></div>`;
    card.querySelector(".meta span").textContent = key.task_id;
    const tail = (conversation.transcript || []).at(-1);
    card.querySelector(".preview").textContent = tail ? (tail.text || tt("kind", tail.kind)) : "";
    card.onclick = () => { selected = key; render(); };
    return card;
  }));

  const review = state.review;
  $("review-panel").hidden = !review || !(review.changes || []).length;
  if (review && (review.changes || []).length) {
    const previous = new Set(
      [...document.querySelectorAll("#review input:checked")].map((box) => box.dataset.id)
    );
    $("review").replaceChildren(...review.changes.map((change) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <label style="display:flex;gap:8px;align-items:baseline">
          <input type="checkbox" data-id="${change.id}">
          <span class="meta"><span>${tt("change", change.kind)}</span></span><span class="path"></span>
        </label>
        <details><summary>diff</summary><pre style="white-space:pre-wrap;font-size:12px"></pre></details>`;
      card.querySelector(".path").textContent = change.path;
      card.querySelector("pre").textContent = change.diff || change.warning || "";
      card.querySelector("input").checked = previous.has(change.id);
      return card;
    }));
  }

  const conversation = selectedConversation();
  $("empty").hidden = !!conversation;
  $("transcript").hidden = !conversation;
  $("composer").hidden = !conversation;
  if (!conversation) return;

  const transcript = $("transcript");
  const nearBottom = transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight < 80;
  transcript.replaceChildren(...(conversation.transcript || []).map((entry) => {
    const item = document.createElement("div");
    item.className = "entry " + (entry.author === "human" ? "human" : entry.kind === "rejected" ? "rejected" : "");
    const kind = entry.kind === "text" ? "" : tt("kind", entry.kind);
    item.innerHTML = `<div class="who"></div><div class="bubble"></div>`;
    item.querySelector(".who").textContent = tt("who", entry.author) + (kind ? " · " + kind : "");
    let text = entry.text || "";
    if (entry.kind === "tool_calls") {
      text = (entry.tool_calls || []).map((c) => `${c.name}(${JSON.stringify(c.input)})`).join("\n");
    }
    item.querySelector(".bubble").textContent = text || t("noText");
    return item;
  }));
  if (nearBottom) transcript.scrollTop = transcript.scrollHeight;

  const active = conversation.phase === "active";
  $("send-progress").disabled = !active;
  $("send-clarify").disabled = !active;
  $("send-final").disabled = !active;
  $("send-tools").disabled = !active;
  $("phase").textContent = tt("phase", conversation.phase);
  if (document.activeElement !== $("draft")) $("draft").value = conversation.draft || "";
}

async function sendText(path) {
  const conversation = selectedConversation();
  if (!conversation) return;
  const text = $("draft").value.trim();
  if (!text) return;
  try {
    await api(path, { ...keyOf(conversation), text });
    $("draft").value = "";
  } catch (error) { alert(t("sendFailed") + error.message); }
}

$("lang").onclick = () => {
  locale = locale === "zh" ? "en" : "zh";
  localStorage.setItem("human-web-locale", locale);
  applyStaticText();
  render();
};
$("send-progress").onclick = () => sendText("/api/reply");
$("send-clarify").onclick = () => sendText("/api/clarify");
$("send-final").onclick = () => {
  if (confirm(t("confirmFinal"))) sendText("/api/final");
};
$("send-tools").onclick = async () => {
  const conversation = selectedConversation();
  if (!conversation) return;
  let calls;
  try { calls = JSON.parse($("tool-calls").value); }
  catch { alert(t("parseError")); return; }
  try {
    await api("/api/tool-calls", { ...keyOf(conversation), calls });
    $("tool-calls").value = "";
  } catch (error) { alert(t("sendFailed") + error.message); }
};
function checkedChangeIDs() {
  return [...document.querySelectorAll("#review input:checked")].map((box) => box.dataset.id);
}
$("deliver-changes").onclick = async () => {
  const conversation = selectedConversation();
  const ids = checkedChangeIDs();
  if (!conversation) { alert(t("needConversation")); return; }
  if (!ids.length) { alert(t("needChanges")); return; }
  try { await api("/api/review/deliver", { ...keyOf(conversation), change_ids: ids }); }
  catch (error) { alert(t("deliverFailed") + error.message); }
};
$("discard-changes").onclick = async () => {
  const ids = checkedChangeIDs();
  if (!ids.length) { alert(t("needChanges")); return; }
  if (!confirm(t("confirmDiscard"))) return;
  try { await api("/api/review/discard", { change_ids: ids }); }
  catch (error) { alert(t("discardFailed") + error.message); }
};
$("draft").addEventListener("input", () => {
  clearTimeout(draftTimer);
  draftTimer = setTimeout(() => {
    const conversation = selectedConversation();
    if (conversation) api("/api/draft", { ...keyOf(conversation), text: $("draft").value }).catch(() => {});
  }, 600);
});
$("draft").addEventListener("keydown", (event) => {
  if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) sendText("/api/reply");
});

function connect() {
  const source = new EventSource("/api/events");
  source.addEventListener("state", (event) => {
    state = JSON.parse(event.data);
    $("status").textContent = t("connected");
    $("status").classList.remove("offline");
    if (!selected && state.conversations.length) selected = keyOf(state.conversations[0]);
    render();
    if (state.inbox.length && Notification.permission === "granted" && document.hidden) {
      new Notification(t("notifyNew"));
    }
  });
  source.onerror = () => {
    $("status").textContent = t("offline");
    $("status").classList.add("offline");
  };
}

if ("Notification" in window && Notification.permission === "default") {
  Notification.requestPermission();
}
applyStaticText();
$("status").textContent = t("connecting");
api("/api/state").then((initial) => { state = initial; render(); }).catch(() => {});
connect();
</script>
</body>
</html>
