name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify distribution terms
        run: test -s LICENSE
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify release contracts
        run: make release-semantics-test release-build-contract-test
      - name: Verify source and race safety
        run: |
          make fmt-check tidy-check build vet
          go test -race -count=1 -timeout=5m ./...

  portable:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and test platform-specific behavior
        run: |
          go build ./...
          go test -count=1 -timeout=5m ./...

  real-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install checksum-pinned OpenCode 1.17.18
        run: |
          destination="$RUNNER_TEMP/opencode-1.17.18"
          ./scripts/install-opencode-real-gate.sh "$destination"
          echo "$destination" >> "$GITHUB_PATH"
      - name: Verify real OpenCode product gates
        run: |
          test "$(opencode --version)" = "1.17.18"
          make real-opencode-web-test REAL_COUNT=3
          make real-opencode-network-test REAL_COUNT=3

  release:
    needs: [verify, portable, real-opencode]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify source remains clean
        run: make check
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: BUILD_DATE="$(git show -s --format=%cI "$GITHUB_SHA")" ./scripts/build-release.sh
      - name: Verify release checksums
        run: (cd dist && sha256sum --check checksums.txt)
      - name: Smoke-test embedded build identity
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          expected="${VERSION#v}"
          tar -xzf "dist/human_${expected}_linux_amd64.tar.gz" -C /tmp human
          /tmp/human version --json | tee /tmp/human-version.json
          jq -e --arg version "$expected" --arg commit "$COMMIT" \
            '.version == $version and .commit == $commit and .build_date != "unknown"' \
            /tmp/human-version.json
      # Asset/tag immutability is enforced by the repository's GitHub setting,
      # not by `gh release create`; this job only verifies and publishes the tag.
      - name: Publish verified tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! release_flags_output="$(./scripts/github-release-flags.sh "$GITHUB_REF_NAME")"; then
            exit 1
          fi
          release_flags=()
          while IFS= read -r flag; do
            release_flags+=("$flag")
          done <<< "$release_flags_output"
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag --generate-notes "${release_flags[@]}"
