name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Build
        run: go build ./...
      - name: Unit and integration tests
        run: go test -race -count=1 -timeout=5m ./...
      - name: Vet
        run: go vet ./...

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Download pinned TLC 2.19
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar \
            --output /tmp/tla2tools.jar
          echo "bee4a54f3ee3d4afc347c3240ec2d9e93b075104  /tmp/tla2tools.jar" | sha1sum --check --strict
      - name: Model and mutation checks
        env:
          TLA2TOOLS: /tmp/tla2tools.jar
        run: ./formal/run-checks.sh
