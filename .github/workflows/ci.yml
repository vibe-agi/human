name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Build
        run: go build ./...
      - name: Unit and integration tests
        run: go test -race -count=1 -timeout=5m ./...
      - name: Vet
        run: go vet ./...
