name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  formal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check Java runtime
        run: java -version
      - name: Exhaustive finite-state protocol checks
        run: make formal-check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"
      - name: Module graph check
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Core storage adapter boundary
        run: |
          sqlite_dependency="$(go list -deps -f '{{if eq .ImportPath "modernc.org/sqlite"}}{{.ImportPath}}{{end}}' . ./agent ./llm ./workspace ./a2a)"
          if [ -n "$sqlite_dependency" ]; then
            echo "core packages must not depend on the SQLite adapter" >&2
            exit 1
          fi
      - name: Build
        run: go build ./...
      - name: Unit and integration tests
        run: go test -race -count=1 -timeout=5m ./...
      - name: Vet
        run: go vet ./...

  portable-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all packages
        run: go build ./...
      - name: Test platform-specific paths and process handling
        run: go test -count=1 -timeout=5m ./...
