version: 2
updates:
  - package-ecosystem: gomod
    directories:
      - /
      - /tests/container-clients
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      routine-go-updates:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
