SPECIFICATION ParallelContextSpec

CONSTANTS
  ContextIds = {context_1}
  WorkspaceIds = {workspace_1}
  TaskIds = {task_1, task_2}
  MessageIds = {message_1, message_2}
  ArtifactIds = {artifact_1}
  MaxVersion = 1

INVARIANTS
  TypeOK
  AgentKeyIsolation
  TaskIdentityWellFormed
  MessageHistoryWellFormed
  MessageTurnsAlternate
  ArtifactWellFormed
  TerminalArtifactsSettled
  PublicationAtomic
  ReceiptWellFormed
  BaselineWithinDraft
  BaselineJustified
  NoForkedWorkspaceSuccess

PROPERTIES
  TaskIdentityImmutable
  MessagesAppendOnly
  MessageAuthorsImmutable
  ParallelContextEventuallyWorking
