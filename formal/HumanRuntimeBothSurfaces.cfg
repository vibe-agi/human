\* HumanLLM and HumanAgent share one gateway/runtime without sharing keys,
\* leases, events, receipts, or capacity accounting. Workspace serialization
\* across their distinct payload semantics is checked in HumanSystem.cfg.
CONSTANTS
  ModeledSurfaces = {"llm", "agent"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 2
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 0
SPECIFICATION Spec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
