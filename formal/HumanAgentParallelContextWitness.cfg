\* Expected to fail: Context is display grouping, not a scheduler lock.
\* ParallelContextSpec must reach two active Tasks in the same Context.
SPECIFICATION ParallelContextSpec

CONSTANTS
  ContextIds = {context_1}
  WorkspaceIds = {workspace_1}
  TaskIds = {task_1, task_2}
  MessageIds = {message_1, message_2}
  ArtifactIds = {artifact_1}
  MaxVersion = 1

INVARIANT AtMostOneActiveTaskPerContext
