SPECIFICATION ConversationSpec

CONSTANTS
  ContextIds = {context_1}
  WorkspaceIds = {workspace_1}
  TaskIds = {task_1}
  MessageIds = {message_1, message_2, message_3,
                message_4, message_5, message_6}
  ArtifactIds = {artifact_1}
  MaxVersion = 1

INVARIANTS
  TypeOK
  AgentKeyIsolation
  TaskIdentityWellFormed
  MessageHistoryWellFormed
  MessageTurnsAlternate
  ArtifactWellFormed
  TerminalArtifactsSettled
  PublicationAtomic

PROPERTIES
  TerminalTasksImmutable
  TaskIdentityImmutable
  TerminalTaskMessagesImmutable
  MessagesAppendOnly
  MessageAuthorsImmutable
  TwoInputRoundsEventuallyComplete
