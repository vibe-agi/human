\* Focused transition-oracle configuration. The full safety matrix contains
\* these properties too; keeping this small surface lets each mutant prove
\* the intended terminal/result branch rather than an adjacent invariant.
SPECIFICATION SafetySpec

CONSTANTS
  Callers = {caller_1}
  Workspaces = {workspace_1}
  Tasks = {task_1}
  Requests = {request_1, request_2}
  Digests = {digest_1}
  MaxVersion = 2
  MaxCursor = 2
  MaxClarifications = 1
  CallerAvailable = TRUE

INVARIANTS
  TypeOK
  RequestOwnershipIsStable
  ResultBucketsDoNotSwallowEachOther
  BaselineAdvancesOnlyOnSuccess
  TerminalTaskCannotBeReopened

PROPERTIES
  ResponseTerminalTransitionMatchesTask
  ReconcileResultIsExact
