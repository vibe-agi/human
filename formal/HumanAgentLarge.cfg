\* Scaled-up config for reproducibility (54,478 distinct states under TLC 2.19).
\* Same properties as HumanAgent.cfg, larger bounds.
CONSTANTS
  MaxTurns = 4
  MaxLocalEdits = 2
  MaxRewinds = 2
SPECIFICATION FairSpec
INVARIANTS
  TypeOK
  LatestValid
  AppliedReal
  SupersededOK
  RewindPendingOK
PROPERTIES
  TurnsAppendOnly
  SupersededMonotone
  EventuallyTerminal
  EventuallyConsistent
