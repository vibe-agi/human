\* Expected to fail: two independent Contexts may legitimately hold frozen
\* Artifacts for the same Workspace. The shared CAS oracle, not Context, must
\* serialize their apply receipts.
SPECIFICATION Spec

CONSTANTS
  ContextIds = {context_1, context_2}
  WorkspaceIds = {workspace_1}
  TaskIds = {task_1, task_2}
  MessageIds = {message_1, message_2}
  ArtifactIds = {artifact_1, artifact_2}
  MaxVersion = 2

INVARIANT AtMostOneArtifactContextPerWorkspace
