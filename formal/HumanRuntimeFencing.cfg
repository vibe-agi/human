\* Two workers and two fence epochs make stale-owner delivery reachable.
\* A retired or superseded grant must NACK and settle, never commit an effect.
CONSTANTS
  ModeledSurfaces = {"llm"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker_a, worker_b}
  Capacity = 1
  MaxFence = 2
  MaxVersion = 1
  MaxFaults = 0
SPECIFICATION LiveSpec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
  OutboxEventuallySettles
  LateEventsDoNotPoison
