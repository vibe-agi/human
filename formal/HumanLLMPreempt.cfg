SPECIFICATION LivenessSpec

CONSTANTS
  Callers = {caller_1}
  Workspaces = {workspace_1}
  Tasks = {task_1}
  \* One abandoned request plus one exact resume is the smallest complete
  \* takeover witness. A third request multiplies liveness SCC exploration
  \* without exercising another preemption rule.
  Requests = {request_1, request_2}
  Digests = {digest_1, digest_2}
  MaxVersion = 1
  MaxCursor = 2
  MaxClarifications = 1
  CallerAvailable = TRUE

INVARIANTS
  TypeOK
  KeysRemainOnLLMSurface
  RequestOwnershipIsStable
  IdempotencyObservationsAreExact
  HTTPDecisionPrecedesVisibility
  TraceMatchesCursor
  StreamTerminalIsFinal
  ToolCallsCloseOnlyTheirResponse
  ClarificationsCloseOnlyTheirResponse
  ResultBucketsDoNotSwallowEachOther
  BaselineAdvancesOnlyOnSuccess
  ResultTurnReconcilesBeforeResponse
  TerminalTaskCannotBeReopened

PROPERTIES
  RequestIdentityImmutable
  HTTPDecisionsImmutable
  ClosedResponsesImmutable
  ResponseTerminalTransitionMatchesTask
  ResponsesEventuallyClose
  ResumeNeverPermanentlyBlocked
\* TasksEventuallyTerminal is intentionally omitted here: with two digests the
\* takeover consumes extra request ids, so a bounded run can exhaust them while
\* a task awaits its caller -- an environment boundary ProtocolQuiescent already
\* admits, not a protocol deadlock. Task termination is covered by the
\* single-digest HumanLLMLiveness config.
