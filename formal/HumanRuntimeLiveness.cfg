\* Bounded faults plus explicit RuntimeFairness. This proves recovery and
\* eventual ACK/NACK; it does not assume that an unboundedly hostile network
\* or an absent Human must make progress.
CONSTANTS
  ModeledSurfaces = {"agent"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 1
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 1
SPECIFICATION LiveSpec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
  EnvironmentEventuallyRecovers
  OutboxEventuallySettles
  LateEventsDoNotPoison
  OutcomesEventuallyVisible
  WorkspaceEventuallyResolves
