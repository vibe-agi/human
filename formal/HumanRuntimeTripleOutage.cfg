\* Safety and recovery when caller, gateway, and Human worker can all be
\* down at once. Three bounded failures cover every crash ordering; durable
\* state must merely stop while offline, never fork or disappear.
CONSTANTS
  ModeledSurfaces = {"agent"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 1
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 3
SPECIFICATION LiveSpec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
  EnvironmentEventuallyRecovers
  OutboxEventuallySettles
  LateEventsDoNotPoison
  OutcomesEventuallyVisible
  WorkspaceEventuallyResolves
