\* Repeated network/service instability: five crash, link, data, or ACK
\* failures may be interleaved with arbitrary recoveries.  Liveness is
\* asserted only after the finite storm ends and the environment stabilizes.
CONSTANTS
  ModeledSurfaces = {"agent"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 1
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 5

SPECIFICATION LiveSpec

INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK

PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
  EnvironmentEventuallyRecovers
  OutboxEventuallySettles
  LateEventsDoNotPoison
  OutcomesEventuallyVisible
  WorkspaceEventuallyResolves
