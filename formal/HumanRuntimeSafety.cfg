\* Small, failure-free state space for the full runtime safety invariant set.
CONSTANTS
  ModeledSurfaces = {"llm"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 1
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 0
SPECIFICATION Spec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
