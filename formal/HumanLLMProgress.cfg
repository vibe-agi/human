SPECIFICATION ProgressSpec

CONSTANTS
  Callers = {caller_1}
  Workspaces = {workspace_1}
  Tasks = {task_1}
  Requests = {request_1}
  Digests = {digest_1}
  MaxVersion = 1
  MaxCursor = 3
  MaxClarifications = 0
  CallerAvailable = TRUE

INVARIANTS
  TypeOK
  RequestOwnershipIsStable
  HTTPDecisionPrecedesVisibility
  TraceMatchesCursor
  StreamTerminalIsFinal

PROPERTIES
  RequestIdentityImmutable
  HTTPDecisionsImmutable
  ClosedResponsesImmutable
  ResponseTerminalTransitionMatchesTask
  ResponseTracesAppendOnly
  MultipleProgressSegmentsEventuallyClose
