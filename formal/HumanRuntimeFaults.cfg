\* Safety under one independently chosen crash, link drop, packet drop, or
\* ACK/NACK drop. Digest reuse is isolated in HumanRuntimeDigestConflict.cfg
\* so network interleavings remain an intentionally small model.
CONSTANTS
  ModeledSurfaces = {"llm"}
  Scopes = {scope}
  ItemIDs = {item}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 1
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 1
SPECIFICATION Spec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  LeaseFencingOK
  DurableBeforeVisible
  ReceiptConsistency
  AckAfterDurable
  OutboxAccounting
  WorkspaceCASOK
PROPERTIES
  FaultPreservesDurable
  EffectAuthorizedAtCommit
  DurableHistoriesAppendOnly
