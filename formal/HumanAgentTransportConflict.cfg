CONSTANTS
  Authorities = {authority}
  Workspaces = {workspace}
  TaskIDs = {task}
  Workers = {worker}
  DeliveryIDs = {delivery_a, delivery_b}
  CommandIDs = {command}
  Digests = {digest_a, digest_b}
  MaxFence = 1
  MaxRevision = 2
  MaxOutbox = 2
  MaxFaults = 0

SPECIFICATION Spec

INVARIANTS
  TypeOK
  VisibleGrantIsDurable
  FenceHistoryMonotone
  GrantGenerationUnique
  TerminalTaskHasNoActiveGrant
  CommandReceiptUnique
  WorkerEffectAuthorizedAtCommit
  TaskRevisionCheckedAtCommit
