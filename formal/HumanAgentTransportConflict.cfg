  EffectAppliedExactlyOnce
  AcceptedDeliveryHasExactCommand
  ExactReplayNeverRejected
  DeliveryDecisionExclusive
  ACKAfterDurableDecision
  SettledAfterDurableDecision
  CommitFactExact
