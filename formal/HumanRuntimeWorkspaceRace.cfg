\* Two work items draft from one workspace base. The first CAS succeeds; the
\* stale second proposal must become an explicit conflict.
CONSTANTS
  ModeledSurfaces = {"agent"}
  Scopes = {scope}
  ItemIDs = {item_a, item_b}
  EventIDs = {event}
  Digests = {digest}
  Workers = {worker}
  Capacity = 2
  MaxFence = 1
  MaxVersion = 1
  MaxFaults = 0
SPECIFICATION WorkspaceRaceSpec
INVARIANTS
  TypeOK
  ScopedIsolation
  AdmissionAndCapacityOK
  WorkspaceCASOK
PROPERTIES
  DurableHistoriesAppendOnly
  WorkspaceRaceEventuallyExplicit
